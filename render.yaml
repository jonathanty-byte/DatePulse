# Render Blueprint — one-click deploy from GitHub.
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: datepulse-api
    runtime: python
    buildCommand: pip install -r engine/requirements.txt
    startCommand: uvicorn engine.api.routes:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /opt/render/project/data/datepulse.db
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # User must set manually
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /api/health
    plan: free
    disk:
      name: datepulse-data
      mountPath: /opt/render/project/data
      sizeGB: 1
