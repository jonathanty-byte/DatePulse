# DatePulse hourly data collection pipeline.
# Runs every hour via GitHub Actions cron.
# Collects data, computes scores, generates forecasts, sends alerts.

name: Hourly Collection

on:
  schedule:
    # Every hour at minute 15
    - cron: "15 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: engine/requirements.txt

      - name: Install dependencies
        run: pip install -r engine/requirements.txt

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/datepulse.db
          key: datepulse-db-${{ github.run_id }}
          restore-keys: |
            datepulse-db-

      - name: Run full pipeline
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          DB_PATH: data/datepulse.db
        run: python -m engine.main

      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: datepulse-db-${{ github.run_number }}
          path: data/datepulse.db
          retention-days: 7

      - name: Trigger Render pipeline
        if: always()
        run: |
          curl -sf -X POST "https://datepulse-api.onrender.com/api/admin/collect" \
            -H "X-Admin-Key: ${{ secrets.ADMIN_KEY }}" \
            || echo "Render trigger failed (service may be sleeping)"
