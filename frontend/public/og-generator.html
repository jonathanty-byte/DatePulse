<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    font-family: 'Inter', sans-serif;
    background: #080b14;
    overflow: hidden;
    position: relative;
  }

  /* Subtle gradient overlay */
  .bg-gradient {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 70% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 20% 80%, rgba(236, 72, 153, 0.08) 0%, transparent 50%);
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    height: 100%;
    padding: 60px 70px;
    gap: 60px;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
  }

  .logo-text {
    font-size: 24px;
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: -0.5px;
  }

  h1 {
    font-size: 52px;
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 20px;
  }

  h1 .white { color: #f1f5f9; }
  h1 .gradient {
    background: linear-gradient(135deg, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 20px;
    color: #94a3b8;
    line-height: 1.5;
    max-width: 440px;
  }

  .apps-row {
    display: flex;
    gap: 16px;
    margin-top: 32px;
    align-items: center;
  }

  .app-pill {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.5px;
    border: 1.5px solid;
  }

  .tinder { color: #ec4899; border-color: rgba(236, 72, 153, 0.3); background: rgba(236, 72, 153, 0.08); }
  .hinge { color: #8b5cf6; border-color: rgba(139, 92, 246, 0.3); background: rgba(139, 92, 246, 0.08); }
  .happn { color: #f97316; border-color: rgba(249, 115, 22, 0.3); background: rgba(249, 115, 22, 0.08); }

  .privacy {
    margin-top: 20px;
    font-size: 13px;
    color: #64748b;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .right {
    width: 380px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
  }

  .stat-card {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    padding: 18px 22px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .stat-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .stat-icon.pink { background: rgba(236, 72, 153, 0.12); }
  .stat-icon.blue { background: rgba(59, 130, 246, 0.12); }
  .stat-icon.amber { background: rgba(245, 158, 11, 0.12); }
  .stat-icon.green { background: rgba(16, 185, 129, 0.12); }

  .stat-label {
    font-size: 13px;
    color: #64748b;
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 20px;
    font-weight: 800;
    color: #e2e8f0;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="container">
    <div class="left">
      <div class="logo-row">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 15.5 C16.2 13, 12 13, 12 16.2 C12 19, 15.2 22.5, 18 25 C20.8 22.5, 24 19, 24 16.2 C24 13, 19.8 13, 18 15.5Z" fill="white" />
            <path d="M26 11 A 12 12 0 0 1 26 29" stroke="white" stroke-width="1.6" opacity="0.5" fill="none" stroke-linecap="round" />
            <path d="M29.5 7 A 17 17 0 0 1 29.5 33" stroke="white" stroke-width="1.3" opacity="0.3" fill="none" stroke-linecap="round" />
            <path d="M33 3.5 A 22 22 0 0 1 33 36.5" stroke="white" stroke-width="1" opacity="0.15" fill="none" stroke-linecap="round" />
          </svg>
        </div>
        <span class="logo-text">DatePulse</span>
      </div>
      <h1>
        <span class="white">Tes donnees de dating</span><br>
        <span class="gradient">racontent une histoire</span>
      </h1>
      <p class="subtitle">
        Analyse ton export RGPD. Ghost rate, timing, courbe de survie, verdict.
      </p>
      <div class="apps-row">
        <span class="app-pill tinder">Tinder</span>
        <span class="app-pill hinge">Hinge</span>
        <span class="app-pill happn">Happn</span>
      </div>
      <div class="privacy">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="#64748b"><path fill-rule="evenodd" d="M10 1a4.5 4.5 0 00-4.5 4.5V9H5a2 2 0 00-2 2v6a2 2 0 002 2h10a2 2 0 002-2v-6a2 2 0 00-2-2h-.5V5.5A4.5 4.5 0 0010 1zm3 8V5.5a3 3 0 10-6 0V9h6z" clip-rule="evenodd"/></svg>
        100% prive — tes donnees ne quittent jamais ton appareil
      </div>
    </div>
    <div class="right">
      <div class="stat-card">
        <div class="stat-icon pink">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="#ec4899"><path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd"/></svg>
        </div>
        <div>
          <div class="stat-label">Swipes analyses</div>
          <div class="stat-value">27 040</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon blue">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="#3b82f6"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/></svg>
        </div>
        <div>
          <div class="stat-label">Timing optimal</div>
          <div class="stat-value">Dimanche 21h</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon amber">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="#f59e0b"><path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"/><path d="M15 7v2a4 4 0 01-4 4H9.828l-1.766 1.767c.28.149.599.233.938.233h2l3 3v-3h2a2 2 0 002-2V9a2 2 0 00-2-2h-1z"/></svg>
        </div>
        <div>
          <div class="stat-label">Ghost rate</div>
          <div class="stat-value">62%</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="#10b981"><path fill-rule="evenodd" d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg>
        </div>
        <div>
          <div class="stat-label">Verdict</div>
          <div class="stat-value">Ton ADN dating</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
